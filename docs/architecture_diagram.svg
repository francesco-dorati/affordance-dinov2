<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1620" font-family="-apple-system, 'Segoe UI', Arial, sans-serif">
  <defs>
    <style>
      .input    { fill: #E8E8E8; stroke: #555; stroke-width: 2; }
      .vit      { fill: #C5DAEC; stroke: #4A7BA8; stroke-width: 2; }
      .vit-lite { fill: #DCE9F3; stroke: #4A7BA8; stroke-width: 1.5; }
      .rgb      { fill: #CDE6C4; stroke: #5A8E4C; stroke-width: 2; }
      .rgb-lite { fill: #E0EFD9; stroke: #5A8E4C; stroke-width: 1.5; }
      .proj     { fill: #F4D499; stroke: #A77A2E; stroke-width: 2; }
      .fuse     { fill: #F2B47F; stroke: #B26A2A; stroke-width: 2; }
      .neck     { fill: #E5C0F0; stroke: #7E4FA2; stroke-width: 2; }
      .head     { fill: #F2B0CC; stroke: #A1538E; stroke-width: 2; }
      .out      { fill: #FFF1A8; stroke: #A18B30; stroke-width: 2; }
      .loss     { fill: #FFE6B0; stroke: #B0913C; stroke-width: 2; stroke-dasharray: 5,3; }
      .grouping { fill: none; stroke: #888; stroke-dasharray: 6,4; stroke-width: 1.2; rx: 12; ry: 12; }

      .label       { font-size: 14px; fill: #1a1a1a; font-weight: 600; }
      .sub         { font-size: 11px; fill: #444; }
      .shape       { font-size: 11px; fill: #28288A; font-family: 'SF Mono','Courier New',monospace; }
      .title       { font-size: 22px; font-weight: 700; fill: #111; }
      .subtitle    { font-size: 13px; fill: #555; }
      .group-title { font-size: 13px; font-weight: 700; fill: #555; letter-spacing: 0.5px; }

      .arrow    { stroke: #333;    stroke-width: 1.8; fill: none; marker-end: url(#arrow-k); }
      .arrow-g  { stroke: #5A8E4C; stroke-width: 1.6; fill: none; marker-end: url(#arrow-g); stroke-dasharray: 6,3; }
      .arrow-b  { stroke: #4A7BA8; stroke-width: 1.6; fill: none; marker-end: url(#arrow-b); }
      .arrow-r  { stroke: #A1538E; stroke-width: 1.6; fill: none; marker-end: url(#arrow-r); }
    </style>
    <marker id="arrow-k" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="arrow-g" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5A8E4C" />
    </marker>
    <marker id="arrow-b" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4A7BA8" />
    </marker>
    <marker id="arrow-r" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#A1538E" />
    </marker>
  </defs>

  <!-- ============ TITLE ============ -->
  <text x="750" y="36" text-anchor="middle" class="title">Multi-Task Affordance Decoder</text>
  <text x="750" y="58" text-anchor="middle" class="subtitle">Frozen DINOv2 (multi-scale)  +  RGB skip connections  →  affordance mask  +  surface normals</text>

  <!-- ============ INPUT ============ -->
  <rect x="640" y="100" width="220" height="60" rx="8" class="input"/>
  <text x="750" y="125" text-anchor="middle" class="label">RGB Image</text>
  <text x="750" y="145" text-anchor="middle" class="shape">[B, 3, 448, 448]</text>

  <!-- splitter lines -->
  <line x1="750" y1="160" x2="750" y2="180" class="arrow"/>
  <path d="M 750,180 L 350,180 L 350,210" class="arrow"/>
  <path d="M 750,180 L 1150,180 L 1150,210" class="arrow"/>

  <!-- ============ ViT BRANCH (left) ============ -->
  <rect x="80" y="200" width="540" height="640" class="grouping"/>
  <text x="350" y="222" text-anchor="middle" class="group-title">VIT BRANCH (FROZEN ENCODER)</text>

  <!-- DINOv2 box -->
  <rect x="220" y="240" width="260" height="70" rx="8" class="vit"/>
  <text x="350" y="265" text-anchor="middle" class="label">DINOv2 ViT-Small (frozen)</text>
  <text x="350" y="282" text-anchor="middle" class="sub">12 transformer blocks, patch=14</text>
  <text x="350" y="298" text-anchor="middle" class="sub">tap layers {2, 5, 8, 11}</text>

  <line x1="350" y1="310" x2="350" y2="335" class="arrow"/>

  <!-- 4 ViT tap outputs (compact stack) -->
  <rect x="170" y="335" width="360" height="80" rx="8" class="vit-lite"/>
  <text x="350" y="357" text-anchor="middle" class="label">4 intermediate feature maps</text>
  <text x="350" y="375" text-anchor="middle" class="sub">one per tapped layer</text>
  <text x="350" y="400" text-anchor="middle" class="shape">each: [B, 384, 32, 32]</text>

  <line x1="350" y1="415" x2="350" y2="440" class="arrow"/>

  <!-- vit_proj -->
  <rect x="200" y="440" width="300" height="56" rx="8" class="proj"/>
  <text x="350" y="463" text-anchor="middle" class="label">vit_proj  (4 × 1×1 Conv)</text>
  <text x="350" y="482" text-anchor="middle" class="sub">channels 384 → 256, per layer</text>

  <line x1="350" y1="496" x2="350" y2="520" class="arrow"/>
  <text x="360" y="513" class="shape">4 × [B, 256, 32, 32]</text>

  <!-- concat -->
  <rect x="240" y="520" width="220" height="48" rx="8" class="proj"/>
  <text x="350" y="540" text-anchor="middle" class="label">Concat along channels</text>
  <text x="350" y="558" text-anchor="middle" class="shape">[B, 1024, 32, 32]</text>

  <line x1="350" y1="568" x2="350" y2="595" class="arrow"/>

  <!-- ConvBlock fuse -->
  <rect x="220" y="595" width="260" height="56" rx="8" class="fuse"/>
  <text x="350" y="617" text-anchor="middle" class="label">ConvBlock  (Conv 3×3 ×2)</text>
  <text x="350" y="636" text-anchor="middle" class="sub">1024 → 256, BN + ReLU</text>

  <line x1="350" y1="651" x2="350" y2="675" class="arrow"/>

  <!-- Bottleneck -->
  <rect x="240" y="675" width="220" height="52" rx="8" class="neck"/>
  <text x="350" y="697" text-anchor="middle" class="label">Fused ViT features</text>
  <text x="350" y="716" text-anchor="middle" class="shape">[B, 256, 32, 32]</text>

  <!-- ============ RGB STEM BRANCH (right) ============ -->
  <rect x="880" y="200" width="540" height="640" class="grouping"/>
  <text x="1150" y="222" text-anchor="middle" class="group-title">RGB STEM (TRAINABLE ENCODER)</text>

  <rect x="1020" y="240" width="260" height="60" rx="8" class="rgb"/>
  <text x="1150" y="263" text-anchor="middle" class="label">Shallow CNN stem</text>
  <text x="1150" y="282" text-anchor="middle" class="sub">3 strided blocks producing 4 levels</text>

  <line x1="1150" y1="300" x2="1150" y2="330" class="arrow"/>

  <!-- s0 — biggest (highest spatial resolution) -->
  <rect x="930" y="330" width="440" height="50" rx="8" class="rgb-lite"/>
  <text x="1150" y="350" text-anchor="middle" class="label">s0 — finest skip</text>
  <text x="1150" y="368" text-anchor="middle" class="shape">[B, 32, 448, 448]</text>

  <line x1="1150" y1="380" x2="1150" y2="405" class="arrow"/>

  <rect x="965" y="405" width="370" height="50" rx="8" class="rgb-lite"/>
  <text x="1150" y="425" text-anchor="middle" class="label">s1</text>
  <text x="1150" y="443" text-anchor="middle" class="shape">[B, 64, 224, 224]</text>

  <line x1="1150" y1="455" x2="1150" y2="480" class="arrow"/>

  <rect x="1000" y="480" width="300" height="50" rx="8" class="rgb-lite"/>
  <text x="1150" y="500" text-anchor="middle" class="label">s2</text>
  <text x="1150" y="518" text-anchor="middle" class="shape">[B, 96, 112, 112]</text>

  <line x1="1150" y1="530" x2="1150" y2="555" class="arrow"/>

  <rect x="1040" y="555" width="220" height="50" rx="8" class="rgb-lite"/>
  <text x="1150" y="575" text-anchor="middle" class="label">s3 — coarsest skip</text>
  <text x="1150" y="593" text-anchor="middle" class="shape">[B, 128, 56, 56]</text>

  <!-- ============ DECODER CASCADE (centered) ============ -->
  <rect x="240" y="780" width="1020" height="520" class="grouping"/>
  <text x="750" y="803" text-anchor="middle" class="group-title">DECODER CASCADE  (FUSION UPSAMPLING)</text>

  <!-- Connection from bottleneck down/right to FusionUp1 -->
  <path d="M 350,727 L 350,755 L 620,755 L 620,820" class="arrow-b"/>
  <text x="495" y="748" class="shape">[B, 256, 32, 32]</text>

  <!-- FusionUp1 -->
  <rect x="500" y="820" width="380" height="64" rx="8" class="fuse"/>
  <text x="690" y="843" text-anchor="middle" class="label">FusionUp 1   (32×32 → 56×56)</text>
  <text x="690" y="862" text-anchor="middle" class="sub">bilinear↑ • concat skip • ConvBlock(384→192)</text>
  <text x="690" y="878" text-anchor="middle" class="shape">→ [B, 192, 56, 56]</text>

  <!-- Skip arrow from s3 to FusionUp1 -->
  <path d="M 1150,605 L 1150,635 L 880,635 L 880,850" class="arrow-g"/>
  <text x="1010" y="628" class="shape" fill="#5A8E4C">skip s3 [B, 128, 56, 56]</text>

  <line x1="690" y1="884" x2="690" y2="908" class="arrow"/>

  <!-- FusionUp2 -->
  <rect x="500" y="908" width="380" height="64" rx="8" class="fuse"/>
  <text x="690" y="931" text-anchor="middle" class="label">FusionUp 2   (56×56 → 112×112)</text>
  <text x="690" y="950" text-anchor="middle" class="sub">bilinear↑ • concat skip • ConvBlock(288→128)</text>
  <text x="690" y="966" text-anchor="middle" class="shape">→ [B, 128, 112, 112]</text>

  <!-- Skip arrow from s2 to FusionUp2 -->
  <path d="M 1300,505 L 1380,505 L 1380,940 L 880,940" class="arrow-g"/>
  <text x="1240" y="497" class="shape" fill="#5A8E4C">skip s2 [B, 96, 112, 112]</text>

  <line x1="690" y1="972" x2="690" y2="996" class="arrow"/>

  <!-- FusionUp3 -->
  <rect x="500" y="996" width="380" height="64" rx="8" class="fuse"/>
  <text x="690" y="1019" text-anchor="middle" class="label">FusionUp 3   (112×112 → 224×224)</text>
  <text x="690" y="1038" text-anchor="middle" class="sub">bilinear↑ • concat skip • ConvBlock(192→64)</text>
  <text x="690" y="1054" text-anchor="middle" class="shape">→ [B, 64, 224, 224]</text>

  <!-- Skip arrow from s1 to FusionUp3 -->
  <path d="M 1335,430 L 1420,430 L 1420,1028 L 880,1028" class="arrow-g"/>
  <text x="1240" y="422" class="shape" fill="#5A8E4C">skip s1 [B, 64, 224, 224]</text>

  <line x1="690" y1="1060" x2="690" y2="1084" class="arrow"/>

  <!-- FusionUp4 -->
  <rect x="500" y="1084" width="380" height="64" rx="8" class="fuse"/>
  <text x="690" y="1107" text-anchor="middle" class="label">FusionUp 4   (224×224 → 448×448)</text>
  <text x="690" y="1126" text-anchor="middle" class="sub">bilinear↑ • concat skip • ConvBlock(96→32)</text>
  <text x="690" y="1142" text-anchor="middle" class="shape">→ [B, 32, 448, 448]</text>

  <!-- Skip arrow from s0 to FusionUp4 -->
  <path d="M 1370,355 L 1460,355 L 1460,1116 L 880,1116" class="arrow-g"/>
  <text x="1245" y="347" class="shape" fill="#5A8E4C">skip s0 [B, 32, 448, 448]</text>

  <line x1="690" y1="1148" x2="690" y2="1180" class="arrow"/>

  <!-- Shared trunk output -->
  <rect x="540" y="1180" width="300" height="48" rx="8" class="neck"/>
  <text x="690" y="1199" text-anchor="middle" class="label">Shared decoder output</text>
  <text x="690" y="1218" text-anchor="middle" class="shape">[B, 32, 448, 448]</text>

  <!-- Split to heads -->
  <line x1="690" y1="1228" x2="690" y2="1250" class="arrow"/>
  <path d="M 690,1250 L 470,1250 L 470,1280" class="arrow-r"/>
  <path d="M 690,1250 L 910,1250 L 910,1280" class="arrow-r"/>

  <!-- ============ HEADS ============ -->
  <rect x="320" y="1280" width="300" height="80" rx="8" class="head"/>
  <text x="470" y="1305" text-anchor="middle" class="label">Mask Head</text>
  <text x="470" y="1325" text-anchor="middle" class="sub">1×1 Conv (32 → 1)</text>
  <text x="470" y="1345" text-anchor="middle" class="sub">RAW LOGITS (no sigmoid)</text>

  <rect x="760" y="1280" width="300" height="80" rx="8" class="head"/>
  <text x="910" y="1305" text-anchor="middle" class="label">Normal Head</text>
  <text x="910" y="1325" text-anchor="middle" class="sub">3×3 Conv → BN+ReLU → 1×1 Conv (→ 3)</text>
  <text x="910" y="1345" text-anchor="middle" class="sub">L2-normalize along channels</text>

  <line x1="470" y1="1360" x2="470" y2="1388" class="arrow"/>
  <line x1="910" y1="1360" x2="910" y2="1388" class="arrow"/>

  <!-- Output tensors -->
  <rect x="340" y="1388" width="260" height="50" rx="8" class="out"/>
  <text x="470" y="1410" text-anchor="middle" class="label">mask_logits</text>
  <text x="470" y="1428" text-anchor="middle" class="shape">[B, 1, 448, 448]  float32</text>

  <rect x="780" y="1388" width="260" height="50" rx="8" class="out"/>
  <text x="910" y="1410" text-anchor="middle" class="label">normal_pred</text>
  <text x="910" y="1428" text-anchor="middle" class="shape">[B, 3, 448, 448]  unit vectors</text>

  <!-- losses -->
  <line x1="470" y1="1438" x2="470" y2="1466" class="arrow"/>
  <line x1="910" y1="1438" x2="910" y2="1466" class="arrow"/>

  <rect x="320" y="1466" width="300" height="58" rx="8" class="loss"/>
  <text x="470" y="1488" text-anchor="middle" class="label">DiceBCELoss</text>
  <text x="470" y="1508" text-anchor="middle" class="sub">BCEWithLogits + soft Dice</text>

  <rect x="760" y="1466" width="300" height="58" rx="8" class="loss"/>
  <text x="910" y="1488" text-anchor="middle" class="label">Masked Cosine + Edge Smoothness</text>
  <text x="910" y="1508" text-anchor="middle" class="sub">cosine over GT mask  +  ∇N · exp(−|∇RGB|)</text>

  <!-- L_total annotation -->
  <text x="690" y="1560" text-anchor="middle" class="label">L_total  =  L_mask  +  5.0 · L_normal  +  0.5 · L_smooth</text>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(60, 1480)">
    <text x="0" y="0" class="group-title">LEGEND</text>

    <rect x="0"  y="10" width="20" height="14" class="vit"/>
    <text x="28" y="22" class="sub">Frozen ViT</text>

    <rect x="0"  y="32" width="20" height="14" class="rgb"/>
    <text x="28" y="44" class="sub">RGB Stem (trainable)</text>

    <rect x="0"  y="54" width="20" height="14" class="fuse"/>
    <text x="28" y="66" class="sub">Decoder fusion</text>

    <rect x="0"  y="76" width="20" height="14" class="head"/>
    <text x="28" y="88" class="sub">Task head</text>

    <rect x="0"  y="98" width="20" height="14" class="loss"/>
    <text x="28" y="110" class="sub">Loss term</text>

    <line x1="0" y1="124" x2="22" y2="124" class="arrow"/>
    <text x="28" y="128" class="sub">Forward flow</text>

    <line x1="0" y1="142" x2="22" y2="142" class="arrow-g"/>
    <text x="28" y="146" class="sub">Skip connection</text>
  </g>
</svg>
